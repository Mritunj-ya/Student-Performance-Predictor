<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
</head>
<body>

<h1>Student Performance Predictor</h1>

<form action="/predict" method="POST">

<h3>Student Information</h3>

<label>School</label>
<select name="school" required>
    <option value="GP">GP</option>
    <option value="MS">MS</option>
</select>

<br><br>

<label>Gender</label>
<select name="sex" required>
    <option value="F">Female</option>
    <option value="M">Male</option>
</select>

<br><br>

<label>Age</label>
<input type="number" name="age" min="15" max="22" required>

<br><br>

<label>Address</label>
<select name="address" required>
    <option value="U">Urban</option>
    <option value="R">Rural</option>
</select>

<br><br>

<label>Family Size</label>
<select name="famsize" required>
    <option value="LE3">Less or Equal 3</option>
    <option value="GT3">Greater than 3</option>
</select>

<br><br>

<label>Parent Status</label>
<select name="Pstatus" required>
    <option value="T">Together</option>
    <option value="A">Apart</option>
</select>

<br><br>

<label>Mother Education</label>
<input type="number" name="Medu" min="0" max="4" required>

<br><br>

<label>Father Education</label>
<input type="number" name="Fedu" min="0" max="4" required>

<br><br>

<label>Mother Job</label>
<select name="Mjob" required>
    <option value="teacher">Teacher</option>
    <option value="health">Health</option>
    <option value="services">Services</option>
    <option value="at_home">At Home</option>
    <option value="other">Other</option>
</select>

<br><br>

<label>Father Job</label>
<select name="Fjob" required>
    <option value="teacher">Teacher</option>
    <option value="health">Health</option>
    <option value="services">Services</option>
    <option value="at_home">At Home</option>
    <option value="other">Other</option>
</select>

<br><br>

<label>Reason for Choosing School</label>
<select name="reason" required>
    <option value="home">Home</option>
    <option value="reputation">Reputation</option>
    <option value="course">Course</option>
    <option value="other">Other</option>
</select>

<br><br>

<label>Guardian</label>
<select name="guardian" required>
    <option value="mother">Mother</option>
    <option value="father">Father</option>
    <option value="other">Other</option>
</select>

<br><br>

<label>Travel Time</label>
<input type="number" name="traveltime" min="1" max="4" required>

<br><br>

<label>Study Time</label>
<input type="number" name="studytime" min="1" max="4" required>

<br><br>

<label>Past Class Failures</label>
<input type="number" name="failures" min="0" max="4" required>

<br><br>

<label>Extra Educational Support</label>
<select name="schoolsup" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Family Educational Support</label>
<select name="famsup" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>
<label>Paid Extra Classes</label>
<select name="paid" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Extra Curricular Activities</label>
<select name="activities" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Attended Nursery School</label>
<select name="nursery" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Wants Higher Education</label>
<select name="higher" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Internet Access</label>
<select name="internet" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Romantic Relationship</label>
<select name="romantic" required>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>

<br><br>

<label>Family Relationship Quality (1-5)</label>
<input type="number" name="famrel" min="1" max="5" required>

<br><br>

<label>Free Time (1-5)</label>
<input type="number" name="freetime" min="1" max="5" required>

<br><br>

<label>Going Out with Friends (1-5)</label>
<input type="number" name="goout" min="1" max="5" required>

<br><br>

<label>Workday Alcohol Consumption (1-5)</label>
<input type="number" name="Dalc" min="1" max="5" required>

<br><br>

<label>Weekend Alcohol Consumption (1-5)</label>
<input type="number" name="Walc" min="1" max="5" required>

<br><br>

<label>Current Health Status (1-5)</label>
<input type="number" name="health" min="1" max="5" required>

<br><br>

<label>Number of Absences</label>
<input type="number" name="absences" min="0" required>

<br><br>

<label>First Period Grade (G1)</label>
<input type="number" name="G1" min="0" max="20" required>

<br><br>

<label>Second Period Grade (G2)</label>
<input type="number" name="G2" min="0" max="20" required>

<br><br>

<input type="submit" value="Predict">

</form>

{% if prediction is defined %}

<h2>Predicted Final Grade (G3): {{ prediction }}</h2>

{% endif %}

</body>
</html>
